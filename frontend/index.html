<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI CV Analyzer Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }

.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.15);
}

.gradient-text {
    background: linear-gradient(to right, #6366f1, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.card-hover:hover {
    transform: translateY(-6px) scale(1.03);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.progress-bar {
    height: 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(to right, #4f46e5, #9333ea);
}
</style>
</head>

<body class="bg-gradient-to-br from-indigo-950 via-purple-900 to-black min-h-screen text-white">

<div class="flex flex-col items-center px-4 py-10">

    <!-- Header -->
    <div class="text-center mb-10 max-w-2xl">
        <h1 class="text-4xl md:text-5xl font-bold gradient-text">AI CV Analyzer</h1>
        <p class="text-gray-300 mt-3">Analyze, Improve, and Optimize your resume for real-world hiring 🚀</p>
    </div>

    <!-- Upload Section -->
    <div class="glass p-8 rounded-3xl w-full max-w-xl shadow-2xl">
        <input type="file" id="fileInput" class="w-full mb-4 p-3 rounded-xl bg-white/10 border border-white/20">
        <input type="text" id="githubInput" placeholder="GitHub Username" class="w-full mb-4 p-3 rounded-xl bg-white/10 border border-white/20">

        <button onclick="uploadCV()" class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 font-semibold transition hover:scale-105">
            Analyze CV 🚀
        </button>

        <p id="loading" class="hidden text-center mt-4 animate-pulse">Analyzing your CV...</p>
    </div>

    <!-- Result -->
    <div id="result" class="mt-10 w-full max-w-5xl"></div>

</div>

<script>
async function uploadCV() {
    const file = document.getElementById("fileInput").files[0];
    const github = document.getElementById("githubInput").value;

    if (!file) {
        alert("Upload CV first");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("github", github);

    document.getElementById("loading").classList.remove("hidden");

    try {
        const res = await fetch("https://ai-cv-analyzer-x4vd.onrender.com/api/upload-cv/", {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        showResult(data);

    } catch (e) {
        alert("Server error");
    }

    document.getElementById("loading").classList.add("hidden");
}

function showResult(data) {
    const div = document.getElementById("result");

    div.innerHTML = `
    <div class="grid lg:grid-cols-3 gap-6">

        <!-- LEFT PANEL -->
        <div class="glass p-6 rounded-3xl shadow-xl">
            <h2 class="text-xl font-semibold mb-3">Overall Score</h2>
            <p class="text-5xl font-bold text-green-400 mb-4">${data.score}</p>

            <div>
                <p class="text-sm mb-1">ATS Compatibility</p>
                <div class="progress-bar">
                    <div class="progress-fill" style="width:${data.score}%"></div>
                </div>
            </div>
        </div>

        <!-- MIDDLE PANEL -->
        <div class="glass p-6 rounded-3xl shadow-xl">
            <h2 class="text-xl font-semibold mb-3">Skills</h2>
            <div class="flex flex-wrap gap-2">
                ${data.skills.map(s => `<span class="bg-indigo-500/20 px-3 py-1 rounded-full text-sm card-hover">${s}</span>`).join("")}
            </div>
        </div>
